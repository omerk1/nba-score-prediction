# NBA Score Prediction - Configuration

# Data paths
data_paths:
  raw_db: "data/raw/nba_api.sqlite"
  processed: "data/processed"
  features: "data/features"
  models: "data/models"

# Datasets loading
datasets_loading:
  data_start_date: "2016-10-01"        # Earliest data loaded for rolling-feature context
  train_start_date: "2018-10-16"       # First game actually used as a training sample
  train_end_date: "2024-04-14"         # End of 2023-24 regular season
  validation_start_date: "2024-10-22"  # Start of 2024-25 season
  validation_end_date: "2025-04-13"    # End of 2024-25 regular season
  test_start_date: "2025-10-21"        # Start of 2025-26 season
  test_end_date: "2026-04-12"          # End of 2025-26 regular season
  allowed_season_types:
    - "Regular Season"
  context_season_types:       # Season types loaded as warm-up context for val/test rolling features
    - "Regular Season"
    - "Playoffs"

# Feature engineering
features:
  rolling_windows: [5, 10, 20]   # Games for rolling averages (multiple windows)
  naive_rolling_baseline: 10    # Window used for the naive rolling-avg baseline comparison
  min_games_played: 5     # Minimum games for features
  h2h_margin_window: 3    # Meetings for H2H margin average
  h2h_win_rate_window: 5  # Meetings for H2H win rate
  targets:
    - "PTS_home"
    - "PTS_away"
  exclude:
    - "GAME_ID"
    - "GAME_DATE"
    - "SEASON_ID"
    - "SEASON_TYPE"
    - "HOME_TEAM_ID"
    - "AWAY_TEAM_ID"
    - "PTS_home"
    - "PTS_away"
    - "POINT_DIFF"
    - "TOTAL_POINTS"
    - "HOME_TEAM_WINS"
    - "matchup_key"
    - "FG_PCT_home"
    - "FG_PCT_away"
    - "FT_PCT_home"
    - "FT_PCT_away"
    - "FG3_PCT_home"
    - "FG3_PCT_away"
    - "AST_home"
    - "AST_away"
    - "REB_home"
    - "REB_away"
  
# Model parameters
model:
  random_state: 42
  iterations: 750              # Max boosting rounds; early stopping will use fewer
  early_stopping_rounds: 50    # Stop if val loss doesn't improve for this many rounds
  tuning:
    n_trials: 40
    depth:             [2, 8]       # Best consistently 5-8; [2,10] tried, didn't help (team_deficit_v2)
    learning_rate:     [0.005, 0.15]  # Top trials always <0.08; tightened upper
    l2_leaf_reg:       [1.0, 30.0]
    min_data_in_leaf:  [1, 50]     # Top trials clustered 15-26; extended upper
    subsample:         [0.5, 1.0]
    colsample_bylevel: [0.5, 1.0]
  
elo_features:
  enabled: true
  initial_rating: 1500.0    # Standard Elo starting point for all teams
  k_factor: 11.02           # Tuned via tune_elo.py (elo_param_search); 538 default was 20.0
  home_advantage: 117.87    # Tuned via tune_elo.py (elo_param_search); 538 default was 100.0
  mov_multiplier: true      # Margin-of-victory adjustment (538 formula)
  season_regression: 0.522  # Tuned via tune_elo.py (elo_param_search); 538 default was ~1/3 (0.33)
  tuning:
    n_trials: 30
    k_factor:           [5.0, 40.0]
    home_advantage:     [50.0, 150.0]
    season_regression:  [0.0, 0.75]

injury_features:
  enabled: true
  scorer: formula                           # formula (fast, no API) or llm (richer, needs GOOGLE_API_KEY)
  db_path: "data/raw/injury_features.sqlite"
  llm_model: "gemini-2.5-flash"
  api_calls_per_minute: 900         # Paid tier limit is 1000 RPM; staying 10% under
  parallel_workers: 5               # Concurrent LLM calls; keep below api_calls_per_minute/60 to avoid 503 bursts
  pdf_era_start: "2021-10-01"       # NBA official injury report PDFs available from 2021-22 season
  importance_weights:
    minutes_share: 0.4
    usage_rate: 0.4
    pts_share: 0.2
  severity_weights:
    severe: 1.0    # Surgery, fracture, tear, rupture, ACL
    moderate: 0.6  # Sprain, strain, bone bruise
    minor: 0.3     # Soreness, illness, injury recovery, unknown
  doubtful_weight: 0.8  # Fraction of Out severity applied to Doubtful players
