# NBA Score Prediction - Configuration

# Data paths
data_paths:
  raw_db: "data/raw/nba_api.sqlite"
  processed: "data/processed"
  features: "data/features"
  models: "data/models"

# Datasets loading
datasets_loading:
  data_start_date: "2016-10-01"        # Earliest data loaded for rolling-feature context
  train_start_date: "2018-10-16"       # First game actually used as a training sample
  train_end_date: "2024-04-14"         # End of 2023-24 regular season
  validation_start_date: "2024-10-22"  # Start of 2024-25 season
  validation_end_date: "2025-04-13"    # End of 2024-25 regular season
  test_start_date: "2025-10-21"        # Start of 2025-26 season
  test_end_date: "2026-04-12"          # End of 2025-26 regular season
  allowed_season_types:
    - "Regular Season"
  context_season_types:       # Season types loaded as warm-up context for val/test rolling features
    - "Regular Season"
    - "Playoffs"

# Feature engineering
features:
  rolling_windows: [5, 10, 20]   # Games for rolling averages (multiple windows)
  naive_rolling_baseline: 10    # Window used for the naive rolling-avg baseline comparison
  min_games_played: 5     # Minimum games for features
  h2h_margin_window: 3    # Meetings for H2H margin average
  h2h_win_rate_window: 5  # Meetings for H2H win rate
  targets:
    - "PTS_home"
    - "PTS_away"
  exclude:
    - "GAME_ID"
    - "GAME_DATE"
    - "SEASON_ID"
    - "SEASON_TYPE"
    - "HOME_TEAM_ID"
    - "AWAY_TEAM_ID"
    - "PTS_home"
    - "PTS_away"
    - "POINT_DIFF"
    - "TOTAL_POINTS"
    - "HOME_TEAM_WINS"
    - "matchup_key"
    - "FG_PCT_home"
    - "FG_PCT_away"
    - "FT_PCT_home"
    - "FT_PCT_away"
    - "FG3_PCT_home"
    - "FG3_PCT_away"
    - "AST_home"
    - "AST_away"
    - "REB_home"
    - "REB_away"
  
# Model parameters
model:
  random_state: 42
  iterations: 1000              # Max boosting rounds; early stopping will use fewer
  early_stopping_rounds: 50    # Stop if val loss doesn't improve for this many rounds
  tuning:
    n_trials: 40
    depth:             [3, 10]    # Lower bound 3: previous best landed on boundary (4)
    learning_rate:     [0.01, 0.3]
    l2_leaf_reg:       [1.0, 30.0]
    min_data_in_leaf:  [1, 30]
    subsample:         [0.5, 1.0]
    colsample_bylevel: [0.5, 1.0]
  
injury_features:
  enabled: false
  scorer: llm                           # formula (fast, no API) or llm (richer, needs GOOGLE_API_KEY)
  db_path: "data/raw/injury_features.sqlite"
  llm_model: "gemini-2.5-flash"
  api_calls_per_minute: 900         # Paid tier limit is 1000 RPM; staying 10% under
  parallel_workers: 5               # Concurrent LLM calls; keep below api_calls_per_minute/60 to avoid 503 bursts
  pdf_era_start: "2021-10-01"       # NBA official injury report PDFs available from 2021-22 season
  importance_weights:
    minutes_share: 0.4
    usage_rate: 0.4
    pts_share: 0.2
  formula_weights:
    out_weight: -1.0
    questionable_weight: -0.5
