# NBA Score Prediction - Configuration

# Data paths
data_paths:
  raw_db: "data/raw/basketball.sqlite"
  processed: "data/processed"
  features: "data/features"
  models: "data/models"

# Datasets loading
datasets_loading:
  train_start_date: "2021-10-18"
  train_end_date: "2024-10-21"
  validation_start_date: "2024-10-22"
  validation_end_date: "2025-10-20"
  test_start_date: "2025-10-21"
  test_end_date: "2026-10-10"

# Feature engineering
features:
  rolling_window: 10  # Games for rolling averages
  min_games_played: 5  # Minimum games for features
  exclude:
    - "GAME_ID"
    - "GAME_DATE"
    - "SEASON"
    - "HOME_TEAM_ID"
    - "VISITOR_TEAM_ID"
    - "PTS_home"
    - "PTS_away"
    - "POINT_DIFF"
    - "TOTAL_POINTS"
    - "HOME_TEAM_WINS"
    - "matchup_key"
  
# Model parameters
model:
  random_state: 42
  
# News scraping (for later phases)
news:
  sources:
    - "nba.com"
    - "espn.com"
    - "reddit.com/r/nba"
  update_frequency: "daily"
