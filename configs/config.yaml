# NBA Score Prediction - Configuration

# Data paths
data_paths:
  raw_db: "data/raw/nba_api.sqlite"
  processed: "data/processed"
  features: "data/features"
  models: "data/models"

# Datasets loading
datasets_loading:
  data_start_date: "2016-10-01"    # Earliest data loaded for rolling-feature context
  train_start_date: "2018-10-16"   # First game actually used as a training sample
  train_end_date: "2022-04-10"
  validation_start_date: "2022-10-18"
  validation_end_date: "2023-01-15"
  test_start_date: "2023-01-16"
  test_end_date: "2023-04-09"
  allowed_season_types:
    - "Regular Season"

# Feature engineering
features:
  rolling_window: 10      # Games for rolling averages
  min_games_played: 5     # Minimum games for features
  h2h_margin_window: 3    # Meetings for H2H margin average
  h2h_win_rate_window: 5  # Meetings for H2H win rate
  targets:
    - "PTS_home"
    - "PTS_away"
  exclude:
    - "GAME_ID"
    - "GAME_DATE"
    - "SEASON_ID"
    - "SEASON_TYPE"
    - "HOME_TEAM_ID"
    - "AWAY_TEAM_ID"
    - "PTS_home"
    - "PTS_away"
    - "POINT_DIFF"
    - "TOTAL_POINTS"
    - "HOME_TEAM_WINS"
    - "matchup_key"
  
# Model parameters
model:
  random_state: 42
  
# News scraping (for later phases)
news:
  sources:
    - "nba.com"
    - "espn.com"
    - "reddit.com/r/nba"
  update_frequency: "daily"
